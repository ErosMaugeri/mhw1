<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameValley - Homepage</title>
    <link rel="stylesheet" href="mhw1.css">
</head>
<body>
    <header>
        <h1>GameValley</h1>
        <p>Il giardino dell'Eden dei gamers.</p>
    </header>
    
    <nav>
        <div class="menu-item button"><a href="#giochi">Giochi</a></div>
        <div class="menu-item button"><a href="#news">News</a></div>
        <div class="menu-item button"><a href="#recensioni">Recensioni</a></div>
        <div class="menu-item button"><a href="#contatti">Contatti</a></div>
    </nav>    
    
    <section id="giochi">
        <h2>Stato Attuale dei Giochi</h2>
        <div class="game-container">
            <div class="game-card">
                <img src="game1.jpg" alt="Game 1">
                <p class="status online">Online</p>
            </div>
            <div class="game-card">
                <img src="game3.jpg" alt="Game 3">
                <p class="status online">Online</p>
            </div>
            <div class="game-card">
                <img src="game2.jpg" alt="Game 2">
                <p class="status manutenzione">In Manutenzione</p>
            </div>
        </div>
    </section>
    
    <section id="news">
        <h2>Ultime News</h2>
        <article>
            <img src="news1.jpg" alt="News 1">
            <p>Aggiornamento in arrivo per Assassin's Creed Shadows!</p>
        </article>
    </section>
    
    <footer>
        <p>&copy; 2025 GameValley - Tutti i diritti riservati</p>
    </footer>
</body>
</html>
